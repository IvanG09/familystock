{% extends 'base.html' %}

{% block content %}
<h1>Artikel bearbeiten</h1>
<div class="form-card">
    <form method="POST">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <div class="form-group">
            <label for="name">Name *</label>
            <input type="text" id="name" name="name" value="{{ item.name }}" required>
        </div>
        <div class="form-group">
            <label for="category">Kategorie</label>
            <select id="category" name="category">
                <option value="">-- bitte wählen --</option>
                {% for cat in categories %}
                <option value="{{ cat }}" {% if cat == item.category %}selected{% endif %}>{{ cat }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="form-group">
            <label for="purpose">Verwendungszweck</label>
            <select id="purpose" name="purpose">
                <option value="">-- bitte wählen --</option>
                {% for value, label in purposes %}
                <option value="{{ value }}" {% if value == item.purpose %}selected{% endif %}>{{ label }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="form-group">
            <label for="location">Ort</label>
            <input type="text" id="location" name="location" value="{{ item.location or '' }}">
        </div>
        <div class="form-group">
            <label for="unit">Einheit</label>
            <input type="text" id="unit" name="unit" value="{{ item.unit or '' }}">
        </div>
        <div class="form-group">
            <label for="min_quantity">Mindestmenge</label>
            <input type="number" step="0.1" id="min_quantity" name="min_quantity" value="{{ item.min_quantity }}">
        </div>
        <div class="form-group">
            <label for="expiry_date">Ablaufdatum</label>
            <input type="date" id="expiry_date" name="expiry_date"
                   value="{{ item.expiry_date.isoformat() if item.expiry_date else '' }}">
        </div>
        <div class="form-group">
            <label for="description">Beschreibung</label>
            <textarea id="description" name="description" rows="3">{{ item.description or '' }}</textarea>
        </div>
        <button type="submit" class="btn">Aktualisieren</button>
    </form>
    <p style="color: #666; margin-top: 1rem; font-size: 0.9rem;">
        💡 Die Menge wird hier nicht geändert – nutze dafür „Bestand anpassen" auf der Detailseite (das wird in der Historie protokolliert).
    </p>
</div>
{% endblock %}
